<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareX — Unified Patient Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --primary:#16A34A;
  --primary-hover:#15803D;
  --secondary:#DCFCE7;
  --bg:#FFFFFF;
  --bg-alt:#F8FAF8;
  --text-primary:#111827;
  --text-secondary:#6B7280;
  --border:#E5E7EB;
  --success:#22C55E;
  --warning:#F59E0B;
  --error:#EF4444;
  --card:#F3F4F6;
  --radius:10px;
  --radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(17,24,39,0.04);
  --shadow-md:0 4px 16px rgba(17,24,39,0.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg-alt);
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  font-size:14px;
  line-height:1.5;
}
button{font-family:inherit;cursor:pointer;}
input,select{font-family:inherit;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--secondary);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

button:focus-visible,
a:focus-visible,
input:focus-visible,
select:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
}

/* ---------- Layout shell ---------- */
.app-shell{
  display:flex;
  min-height:100vh;
  width:100%;
}
.sidebar{
  width:248px;
  flex-shrink:0;
  background:var(--bg);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;
  bottom:0;
  left:0;
  z-index:40;
  transition:transform .25s ease;
}
.sidebar-brand{
  display:flex;
  align-items:center;
  gap:10px;
  padding:22px 20px;
  border-bottom:1px solid var(--border);
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.brand-name{font-weight:700;font-size:17px;letter-spacing:-0.01em;}
.brand-sub{font-size:11px;color:var(--text-secondary);margin-top:1px;}

.nav-group{padding:16px 12px;}
.nav-group-label{
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--text-secondary);
  padding:6px 12px;
  margin-top:6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:11px;
  width:100%;
  border:none;
  background:transparent;
  padding:10px 12px;
  border-radius:8px;
  font-size:13.5px;
  font-weight:500;
  color:var(--text-secondary);
  text-align:left;
  margin-bottom:2px;
  transition:background .15s ease,color .15s ease;
}
.nav-item:hover{background:var(--bg-alt);color:var(--text-primary);}
.nav-item.active{background:var(--secondary);color:var(--primary-hover);font-weight:600;}
.nav-item svg{flex-shrink:0;}
.nav-divider{height:1px;background:var(--border);margin:10px 12px;}

.sidebar-foot{
  margin-top:auto;
  padding:16px 20px 20px;
  border-top:1px solid var(--border);
}
.patient-chip{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:10px;background:var(--bg-alt);
}
.avatar-ring{
  width:36px;height:36px;border-radius:50%;
  background:var(--secondary);color:var(--primary-hover);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;
  border:2px solid var(--primary);
}
.patient-chip-name{font-size:13px;font-weight:600;}
.patient-chip-meta{font-size:11.5px;color:var(--text-secondary);}

.main-col{
  flex:1;
  margin-left:248px;
  display:flex;
  flex-direction:column;
  min-width:0;
}
.topbar{
  height:64px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  position:sticky;
  top:0;
  z-index:30;
}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-0.01em;}
.topbar-actions{display:flex;align-items:center;gap:14px;}
.icon-btn{
  width:36px;height:36px;border-radius:9px;border:1px solid var(--border);
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  color:var(--text-secondary);
}
.icon-btn:hover{background:var(--bg-alt);color:var(--text-primary);}
.menu-toggle{display:none;}

.page-content{
  padding:28px;
  max-width:1440px;
  width:100%;
}

/* ---------- Generic building blocks ---------- */
.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:14px;
  gap:12px;
  flex-wrap:wrap;
}
.section-title{font-size:16px;font-weight:700;letter-spacing:-0.01em;}
.section-link{font-size:12.5px;font-weight:600;color:var(--primary-hover);}
.section-sub{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}

.card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
}
.card-flat{
  background:var(--card);
  border-radius:var(--radius-lg);
  padding:18px;
}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border-radius:8px;border:1px solid transparent;
  padding:9px 16px;font-size:13px;font-weight:600;
  transition:background .15s ease, border-color .15s ease, color .15s ease;
  white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-hover);}
.btn-secondary{background:var(--secondary);color:var(--primary-hover);}
.btn-secondary:hover{background:#bdf3ce;}
.btn-outline{background:var(--bg);color:var(--text-primary);border-color:var(--border);}
.btn-outline:hover{background:var(--bg-alt);}
.btn-ghost{background:transparent;color:var(--text-secondary);}
.btn-ghost:hover{color:var(--text-primary);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger-outline{background:#fff;color:var(--error);border-color:#FCA5A5;}
.btn-danger-outline:hover{background:#FEF2F2;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-block{width:100%;}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:999px;
  line-height:1.4;
}
.badge-success{background:#DCFCE7;color:#15803D;}
.badge-warning{background:#FEF3C7;color:#B45309;}
.badge-error{background:#FEE2E2;color:#B91C1C;}
.badge-neutral{background:var(--card);color:var(--text-secondary);}
.badge-info{background:#DBEAFE;color:#1D4ED8;}

.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.dot-success{background:var(--success);}
.dot-warning{background:var(--warning);}
.dot-error{background:var(--error);}

.divider{height:1px;background:var(--border);margin:18px 0;}

.input, .select{
  width:100%;
  border:1px solid var(--border);
  border-radius:8px;
  padding:9px 12px;
  font-size:13px;
  color:var(--text-primary);
  background:var(--bg);
}
.input:focus, .select:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(22,163,74,0.12);}
.field-label{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;display:block;}
.field{margin-bottom:14px;}

.empty-state{
  text-align:center;padding:36px 20px;color:var(--text-secondary);
}

.hr-list > * + *{border-top:1px solid var(--border);}

/* ---------- Hero ---------- */
.hero{
  background:linear-gradient(135deg, var(--primary) 0%, #129049 55%, #0E7A3D 100%);
  border-radius:var(--radius-lg);
  padding:30px 32px;
  color:#fff;
  position:relative;
  overflow:hidden;
  margin-bottom:22px;
}
.hero::after{
  content:"";
  position:absolute;
  right:-60px;top:-60px;
  width:260px;height:260px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
}
.hero::before{
  content:"";
  position:absolute;
  right:60px;bottom:-90px;
  width:180px;height:180px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.hero-eyebrow{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;opacity:.85;}
.hero-title{font-size:25px;font-weight:700;margin:8px 0 6px;letter-spacing:-0.01em;position:relative;z-index:1;}
.hero-desc{font-size:13.5px;opacity:.92;max-width:560px;position:relative;z-index:1;}
.hero-stats{display:flex;gap:28px;margin-top:20px;position:relative;z-index:1;flex-wrap:wrap;}
.hero-stat-num{font-size:21px;font-weight:700;}
.hero-stat-label{font-size:11.5px;opacity:.85;margin-top:2px;}
.hero-actions{margin-top:20px;display:flex;gap:10px;position:relative;z-index:1;}
.hero-btn{
  background:#fff;color:var(--primary-hover);border:none;
  padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px;
}
.hero-btn-outline{
  background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.4);
  padding:10px 18px;border-radius:8px;font-weight:600;font-size:13px;
}

/* ---------- Stat tiles ---------- */
.stat-tile{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px 18px;
}
.stat-tile-top{display:flex;align-items:center;justify-content:space-between;}
.stat-tile-icon{
  width:32px;height:32px;border-radius:8px;background:var(--secondary);
  display:flex;align-items:center;justify-content:center;color:var(--primary-hover);
}
.stat-tile-value{font-size:22px;font-weight:700;margin-top:10px;letter-spacing:-0.01em;}
.stat-tile-label{font-size:12px;color:var(--text-secondary);margin-top:2px;}
.stat-tile-delta{font-size:11px;font-weight:600;margin-top:8px;}

/* ---------- Lists / rows ---------- */
.list-row{
  display:flex;align-items:center;gap:14px;padding:13px 2px;
}
.list-row-icon{
  width:38px;height:38px;border-radius:9px;background:var(--card);
  display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;
}
.list-row-title{font-size:13.5px;font-weight:600;}
.list-row-sub{font-size:12px;color:var(--text-secondary);margin-top:1px;}
.list-row-end{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ---------- Doctor cards ---------- */
.doctor-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px;display:flex;flex-direction:column;gap:10px;
}
.doctor-top{display:flex;gap:12px;align-items:flex-start;}
.doctor-avatar{
  width:46px;height:46px;border-radius:50%;background:var(--secondary);
  color:var(--primary-hover);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.doctor-name{font-size:14px;font-weight:700;}
.doctor-specialty{font-size:12px;color:var(--primary-hover);font-weight:600;margin-top:1px;}
.doctor-meta-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-secondary);}
.doctor-tags{display:flex;gap:6px;flex-wrap:wrap;}

/* ---------- Tabs ---------- */
.tab-row{display:flex;gap:6px;border-bottom:1px solid var(--border);margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{
  border:none;background:transparent;padding:10px 4px;margin-right:18px;
  font-size:13.5px;font-weight:600;color:var(--text-secondary);
  border-bottom:2px solid transparent;
}
.tab-btn.active{color:var(--primary-hover);border-bottom-color:var(--primary);}

.pill-filter{
  display:inline-flex;align-items:center;gap:6px;
  border:1px solid var(--border);background:var(--bg);
  padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:500;color:var(--text-secondary);
}
.pill-filter.active{border-color:var(--primary);color:var(--primary-hover);background:var(--secondary);}

/* ---------- Progress bar ---------- */
.progress-track{height:7px;border-radius:99px;background:var(--card);overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:var(--primary);}

/* ---------- Timeline ---------- */
.timeline{position:relative;padding-left:22px;}
.timeline::before{content:"";position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border);}
.timeline-item{position:relative;padding-bottom:20px;}
.timeline-item:last-child{padding-bottom:0;}
.timeline-dot{
  position:absolute;left:-22px;top:2px;width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid var(--primary);
}
.timeline-dot.warn{border-color:var(--warning);}
.timeline-dot.danger{border-color:var(--error);}
.timeline-time{font-size:11px;color:var(--text-secondary);}
.timeline-label{font-size:13px;font-weight:600;margin-top:1px;}
.timeline-detail{font-size:12px;color:var(--text-secondary);margin-top:2px;}

/* ---------- CDP dashboard ---------- */
.kpi-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;
}
.sim-panel{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px;margin-bottom:18px;
}
.sim-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.sim-btn{
  border:1px dashed var(--border);background:var(--bg-alt);
  border-radius:10px;padding:13px 12px;text-align:left;
  display:flex;flex-direction:column;gap:6px;
}
.sim-btn:hover{border-color:var(--primary);background:var(--secondary);}
.sim-btn-icon{width:28px;height:28px;border-radius:7px;background:var(--secondary);display:flex;align-items:center;justify-content:center;color:var(--primary-hover);}
.sim-btn-title{font-size:12.5px;font-weight:700;}
.sim-btn-desc{font-size:11px;color:var(--text-secondary);}

.segment-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:18px;
}
.segment-bar-track{height:6px;border-radius:99px;background:var(--card);margin-top:10px;overflow:hidden;}
.segment-bar-fill{height:100%;border-radius:99px;}

.funnel-row{display:grid;grid-template-columns:170px 1fr 70px 90px;align-items:center;gap:14px;padding:11px 0;}
.funnel-bar-track{height:24px;border-radius:6px;background:var(--card);overflow:hidden;position:relative;}
.funnel-bar-fill{height:100%;border-radius:6px;background:var(--primary);display:flex;align-items:center;}

.explain-card{
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;background:var(--bg);
}
.explain-card.resolved{opacity:.6;}
.reasoning-step{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;padding:5px 0;color:var(--text-primary);}
.reasoning-step .num{
  width:18px;height:18px;border-radius:50%;background:var(--card);color:var(--text-secondary);
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
}

.stream-panel{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:16px;max-height:480px;overflow-y:auto;
}
.stream-item{
  display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);
  font-size:12.5px;
  animation:fadeIn .35s ease;
}
.stream-item:last-child{border-bottom:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
.stream-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}

.toast-wrap{
  position:fixed;bottom:22px;right:22px;z-index:100;
  display:flex;flex-direction:column;gap:8px;
  max-width:340px;
}
.toast{
  background:var(--text-primary);color:#fff;padding:12px 14px;border-radius:10px;
  font-size:12.5px;box-shadow:var(--shadow-md);
  display:flex;align-items:flex-start;gap:9px;
  animation:slideIn .25s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
.toast-icon{color:var(--success);flex-shrink:0;margin-top:1px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(17,24,39,0.45);
  display:flex;align-items:center;justify-content:center;z-index:90;padding:20px;
}
.modal-box{
  background:#fff;border-radius:var(--radius-lg);padding:24px;max-width:460px;width:100%;
  max-height:88vh;overflow-y:auto;
}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:16px;font-weight:700;}

/* ---------- Responsive ---------- */
@media (max-width:1024px){
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(2,1fr);}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .sim-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-md);}
  .main-col{margin-left:0;}
  .menu-toggle{display:flex;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}
  .kpi-strip{grid-template-columns:repeat(2,1fr);}
  .sim-grid{grid-template-columns:1fr;}
  .hero-stats{gap:18px;}
  .funnel-row{grid-template-columns:130px 1fr 50px;}
  .funnel-row > .funnel-conv{display:none;}
  .page-content{padding:18px;}
}
@media (min-width:1920px){
  .page-content{max-width:1680px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js" crossorigin></script>
<script type="text/babel" data-presets="react" data-type="module" id="carex-app">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* =========================================================================
   GLOBAL EVENT TRACKING SYSTEM (mandatory, structure unchanged)
   ========================================================================= */
window.eventStream = [];

function trackEvent(eventName, payload) {
  console.log("Event:", eventName, payload);
  const entry = { event: eventName, data: payload, timestamp: new Date() };
  window.eventStream.push(entry);
  if (typeof window.__handleEvent === "function") {
    window.__handleEvent(eventName, payload || {});
  }
}
window.trackEvent = trackEvent;

/* =========================================================================
   CONFIG / CONSTANTS
   ========================================================================= */
const REVENUE = {
  followup: 2500,      // INR, average recovered follow-up consult value
  diagnostic: 1800,    // INR, average recovered diagnostic test value
  program: 15000,      // INR, average program enrollment lifetime value (initial cycle)
};

const FUNNEL_STEPS = [
  { key: "appointment_booked", label: "Appointment Booked" },
  { key: "consultation_completed", label: "Consultation Completed" },
  { key: "test_recommended", label: "Test Recommended" },

/* =========================================================================

   ========================================================================= */
function formatINR(n) {
  return "₹" + Math.round(n).toLocaleString("en-IN");
}
function timeAgo(ts) {
  const diff = Math.max(0, Date.now() - new Date(ts).getTime());
  const s = Math.floor(diff / 1000);
  if (s < 5) return "just now";
  if (s < 60) return s + "s ago";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  return h + "h ago";
}
function humanizeEvent(name) {
  return name.replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
}
function uid(prefix) {
  return prefix + "-" + Math.random().toString(36).slice(2, 8);
}

/* =========================================================================
   ROOT APP — central state, event log, CDP rules engine
   ========================================================================= */
function App() {
  const [view, setView] = useState("home");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [dashboardTab, setDashboardTab] = useState("patient360");

  const [eventLog, setEventLog] = useState([]);
  const [toasts, setToasts] = useState([]);

  const [appointmentsUpcoming, setAppointmentsUpcoming] = useState(INITIAL_APPOINTMENTS_UPCOMING);
  const [appointmentsHistory, setAppointmentsHistory] = useState(INITIAL_APPOINTMENTS_HISTORY);

  const [diagRecommended, setDiagRecommended] = useState(INITIAL_DIAGNOSTICS_RECOMMENDED);
  const [diagBooked, setDiagBooked] = useState(INITIAL_DIAGNOSTICS_BOOKED);
  const [diagCompleted, setDiagCompleted] = useState(INITIAL_DIAGNOSTICS_COMPLETED);

  const [programs, setPrograms] = useState(CARE_PROGRAMS);

  const [funnelCounts, setFunnelCounts] = useState(INITIAL_FUNNEL_COUNTS);
  const [segments, setSegments] = useState(INITIAL_SEGMENTS);

  const [riskEntries, setRiskEntries] = useState([]);
  const [recovered, setRecovered] = useState({ followups: 0, diagnostics: 0, programs: 0 });

  // demo "rule flags" representing the patient's live event state
  const [flags, setFlags] = useState({
    appointmentCompleted: false,
    followupRecommended: false,
    followupBooked: false,
    followupWindowElapsed: false,
    followupMissedFired: false,

    consultationCompleted: false,
    testRecommended: false,
    testBooked: false,
    testCompleted: false,
    dropoffWindowElapsed: false,
    dropoffFired: false,

    labResultUploaded: false,
    specialtyViewed: null,
    chronicCandidateFired: false,
  });

  const pushToast = useCallback((message, tone = "success") => {
    const id = uid("toast");
    setToasts((t) => [...t, { id, message, tone }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 4200);
  }, []);

  const incrementFunnel = useCallback((key) => {
    if (!FUNNEL_STEPS.find((s) => s.key === key)) return;
    setFunnelCounts((prev) => ({ ...prev, [key]: (prev[key] || 0) + 1 }));
  }, []);

  /* ---- explainability entry creation ---- */
  const addRiskEntry = useCallback((entry) => {
    setRiskEntries((prev) => [{ ...entry, id: uid("risk"), createdAt: new Date(), resolved: false }, ...prev]);
  }, []);

  const resolveRiskEntry = useCallback((id) => {
    setRiskEntries((prev) => prev.map((r) => (r.id === id ? { ...r, resolved: true } : r)));
  }, []);

  /* ---- central event handler: logs + drives the CDP rules engine ---- */
  const handleEvent = useCallback((eventName, payload) => {
    setEventLog((prev) => [{ id: uid("evt"), event: eventName, data: payload, timestamp: new Date() }, ...prev].slice(0, 300));
    incrementFunnel(eventName);

    setFlags((prevFlags) => {
      const next = { ...prevFlags };
      switch (eventName) {
        case "appointment_completed":
          next.appointmentCompleted = true;
          break;
        case "followup_recommended":
          next.followupRecommended = true;
          break;
        case "followup_booked":
          next.followupBooked = true;
          break;
        case "followup_window_elapsed": // internal simulated time-jump
          next.followupWindowElapsed = true;
          break;
        case "consultation_completed":
          next.consultationCompleted = true;
          break;
        case "test_recommended":
          next.testRecommended = true;
          break;
        case "test_booked":
          next.testBooked = true;
          break;
        case "test_completed":
          next.testCompleted = true;
          break;
        case "dropoff_window_elapsed": // internal simulated time-jump
          next.dropoffWindowElapsed = true;
          break;
        case "lab_result_uploaded":
          next.labResultUploaded = true;
          break;
        case "specialty_viewed":
          next.specialtyViewed = (payload && payload.specialty) || next.specialtyViewed;
          break;
        default:
          break;
      }
      return next;
    });
  }, [incrementFunnel]);

  useEffect(() => {
    window.__handleEvent = handleEvent;
    return () => { window.__handleEvent = null; };
  }, [handleEvent]);

  /* ---- CDP rules engine: evaluate conditions whenever flags change ---- */
  useEffect(() => {
    // Rule 1 — Follow-Up Leakage Detection
    // IF appointment_completed AND followup_recommended AND no followup_booked within 30 days
    if (
      flags.appointmentCompleted &&
      flags.followupRecommended &&
      flags.followupWindowElapsed &&
      !flags.followupBooked &&
      !flags.followupMissedFired
    ) {
      trackEvent("followup_missed", { patientId: PATIENT.id });
      trackEvent("patient_at_risk", { patientId: PATIENT.id, reason: "followup_leakage" });
      setFlags((f) => ({ ...f, followupMissedFired: true }));
      setSegments((s) => ({ ...s, followUpDue: { ...s.followUpDue, size: s.followUpDue.size + 1 } }));
      addRiskEntry({
        type: "followup_leakage",
        title: "Follow-Up Risk Detected",
        severity: "error",
        reasoning: [
          "Consultation completed",
          "Follow-up recommended by physician",
          "30+ days passed with no booking",
          "Marked as follow-up risk and patient-at-risk",
        ],
        actionLabel: "Book Follow-Up Now",
        resolveEvent: "followup_booked",
      });
      pushToast("Follow-up risk detected for " + PATIENT.name, "error");
    }
  }, [flags.appointmentCompleted, flags.followupRecommended, flags.followupWindowElapsed, flags.followupBooked, flags.followupMissedFired]);

  useEffect(() => {
    // Rule 2 — Diagnostic Drop-Off Detection
    // IF consultation_completed AND test_recommended AND no test_booked/test_completed
    if (
      flags.consultationCompleted &&
      flags.testRecommended &&
      flags.dropoffWindowElapsed &&
      !flags.testBooked &&
      !flags.testCompleted &&
      !flags.dropoffFired
    ) {
      trackEvent("diagnostic_dropoff_detected", { patientId: PATIENT.id });
      setFlags((f) => ({ ...f, dropoffFired: true }));
      setSegments((s) => ({ ...s, diagnosticDropoff: { ...s.diagnosticDropoff, size: s.diagnosticDropoff.size + 1 } }));
      addRiskEntry({
        type: "diagnostic_dropoff",
        title: "Diagnostic Drop-Off Risk",
        severity: "warning",
        reasoning: [
          "Consultation completed",
          "Diagnostic test recommended",
          "No test booked or completed since",
          "Marked as diagnostic drop-off risk",
        ],
        actionLabel: "Book Test Now",
        resolveEvent: "test_completed",
      });
      pushToast("Diagnostic drop-off risk detected", "warning");
    }
  }, [flags.consultationCompleted, flags.testRecommended, flags.dropoffWindowElapsed, flags.testBooked, flags.testCompleted, flags.dropoffFired]);

  useEffect(() => {
    // Rule 3 — Chronic Care Program Enrollment candidate
    // IF consultation_completed AND lab_result_uploaded AND specialty_viewed
    if (
      flags.consultationCompleted &&
      flags.labResultUploaded &&
      flags.specialtyViewed &&
      !flags.chronicCandidateFired
    ) {
      trackEvent("chronic_care_candidate_detected", { patientId: PATIENT.id, specialty: flags.specialtyViewed });
      setFlags((f) => ({ ...f, chronicCandidateFired: true }));
      setSegments((s) => ({ ...s, chronicCare: { ...s.chronicCare, size: s.chronicCare.size + 1 } }));
      addRiskEntry({
        type: "chronic_care_candidate",
        title: "Chronic Care Candidate Detected",
        severity: "info",
        reasoning: [
          "Consultation completed",
          "Lab result uploaded",
          "Specialty viewed: " + flags.specialtyViewed,
          "Marked as chronic care program candidate",
        ],
        actionLabel: "Enroll in Program",
        resolveEvent: "program_enrolled",
        programKey: (flags.specialtyViewed || "").toLowerCase(),
      });
      pushToast("Chronic care candidate identified", "info");
    }
  }, [flags.consultationCompleted, flags.labResultUploaded, flags.specialtyViewed, flags.chronicCandidateFired]);

  /* ---- resolution actions invoked from explainability / segment cards ---- */
  const resolveFollowUp = useCallback((riskId) => {
    trackEvent("followup_booked", { patientId: PATIENT.id });
    setFlags((f) => ({ ...f, followupBooked: true }));
    setAppointmentsUpcoming((prev) => [
      { id: uid("A"), doctor: "Dr. Sandeep Rao", specialty: "Endocrinology", date: "30 Jun 2026", time: "5:00 PM", mode: "Video", status: "Confirmed" },
      ...prev,
    ]);
    setRecovered((r) => ({ ...r, followups: r.followups + 1 }));
    setSegments((s) => ({ ...s, followUpDue: { ...s.followUpDue, size: Math.max(0, s.followUpDue.size - 1), recovered: s.followUpDue.recovered + 1 } }));
    resolveRiskEntry(riskId);
    pushToast("Follow-up booked — risk resolved", "success");
  }, [resolveRiskEntry, pushToast]);

  const resolveDiagnostic = useCallback((riskId) => {
    trackEvent("test_booking_started", { patientId: PATIENT.id });
    trackEvent("test_booked", { patientId: PATIENT.id });
    trackEvent("test_completed", { patientId: PATIENT.id });
    setFlags((f) => ({ ...f, testBooked: true, testCompleted: true }));
    setDiagCompleted((prev) => [{ id: uid("T"), name: "HbA1c (Glycated Haemoglobin)", date: "Today", result: "Pending Review" }, ...prev]);
    setDiagRecommended((prev) => prev.filter((_, i) => i !== 0));
    setRecovered((r) => ({ ...r, diagnostics: r.diagnostics + 1 }));
    setSegments((s) => ({ ...s, diagnosticDropoff: { ...s.diagnosticDropoff, size: Math.max(0, s.diagnosticDropoff.size - 1), recovered: s.diagnosticDropoff.recovered + 1 } }));
    resolveRiskEntry(riskId);
    pushToast("Diagnostic test booked and completed — risk resolved", "success");
  }, [resolveRiskEntry, pushToast]);

  const resolveChronicCare = useCallback((riskId, programKeyHint) => {
    const target = programs.find((p) => p.key === programKeyHint) || programs.find((p) => p.key === "diabetes");
    trackEvent("program_enrollment_started", { patientId: PATIENT.id, programId: target.id });
    trackEvent("program_enrolled", { patientId: PATIENT.id, programId: target.id });
    setPrograms((prev) => prev.map((p) => (p.id === target.id ? { ...p, enrolled: true } : p)));
    setRecovered((r) => ({ ...r, programs: r.programs + 1 }));
    setSegments((s) => ({ ...s, chronicCare: { ...s.chronicCare, size: Math.max(0, s.chronicCare.size - 1), recovered: s.chronicCare.recovered + 1 } }));
    resolveRiskEntry(riskId);
    pushToast("Enrolled in " + target.name + " — candidate converted", "success");
  }, [programs, resolveRiskEntry, pushToast]);

  /* ---- simulation buttons ---- */
  const simulateMissedFollowup = useCallback(() => {
    trackEvent("appointment_completed", { patientId: PATIENT.id, appointmentId: "A0987" });
    trackEvent("followup_recommended", { patientId: PATIENT.id, recommendedBy: "Dr. Sandeep Rao" });
    trackEvent("followup_due", { patientId: PATIENT.id });
    trackEvent("followup_window_elapsed", { patientId: PATIENT.id, days: 32 });
  }, []);

  const simulateDiagnosticDropoff = useCallback(() => {
    trackEvent("consultation_completed", { patientId: PATIENT.id, appointmentId: "A0954" });
    trackEvent("test_recommended", { patientId: PATIENT.id, test: "Lipid Profile" });
    trackEvent("dropoff_window_elapsed", { patientId: PATIENT.id, days: 14 });
  }, []);

  const simulateDiabetesCandidate = useCallback(() => {
    trackEvent("consultation_completed", { patientId: PATIENT.id, appointmentId: "A0987" });
    trackEvent("lab_result_uploaded", { patientId: PATIENT.id, test: "HbA1c" });
    trackEvent("specialty_viewed", { patientId: PATIENT.id, specialty: "Diabetes" });
  }, []);

  const simulateProgramEnrollment = useCallback(() => {
    const target = programs.find((p) => p.key === "weight") || programs[0];
    trackEvent("program_viewed", { patientId: PATIENT.id, programId: target.id });
    trackEvent("program_enrollment_started", { patientId: PATIENT.id, programId: target.id });
    trackEvent("program_enrolled", { patientId: PATIENT.id, programId: target.id });
    setPrograms((prev) => prev.map((p) => (p.id === target.id ? { ...p, enrolled: true } : p)));
    setRecovered((r) => ({ ...r, programs: r.programs + 1 }));
    pushToast("Enrolled in " + target.name, "success");
  }, [programs, pushToast]);

  /* ---- page_viewed firing on navigation ---- */
  const navigate = useCallback((key) => {
    setView(key);
    setSidebarOpen(false);
    trackEvent("page_viewed", { page: key, patientId: PATIENT.id });
  }, []);

  useEffect(() => {
    trackEvent("page_viewed", { page: "home", patientId: PATIENT.id });
  }, []);

  const revenueRecovered = useMemo(() => {
    return recovered.followups * REVENUE.followup + recovered.diagnostics * REVENUE.diagnostic + recovered.programs * REVENUE.program;
  }, [recovered]);

  const sharedCtx = {
    view, navigate, dashboardTab, setDashboardTab,
    appointmentsUpcoming, setAppointmentsUpcoming, appointmentsHistory, setAppointmentsHistory,
    diagRecommended, setDiagRecommended, diagBooked, setDiagBooked, diagCompleted, setDiagCompleted,
    programs, setPrograms,
    funnelCounts, segments, riskEntries, recovered, revenueRecovered,
    flags, handleEvent,
    resolveFollowUp, resolveDiagnostic, resolveChronicCare,
    simulateMissedFollowup, simulateDiagnosticDropoff, simulateDiabetesCandidate, simulateProgramEnrollment,
    pushToast, eventLog,
  };

  return (
    <div className="app-shell">
      <Sidebar view={view} navigate={navigate} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
      <div className="main-col">
        <Topbar view={view} setSidebarOpen={setSidebarOpen} eventLog={eventLog} />
        <div className="page-content">
          <PageRouter ctx={sharedCtx} />
        </div>
      </div>
      <ToastStack toasts={toasts} />
    </div>
  );
}

function AppointmentsPage({ ctx }) {

  const [date, setDate] = useState("28 Jun 2026");
  const [time, setTime] = useState("10:00 AM");
  const [mode, setMode] = useState("In-person");
  const [started, setStarted] = useState(false);

  const startBooking = () => {
    if (!started) {
      trackEvent("appointment_booking_started", { patientId: PATIENT.id });
      setStarted(true);
    }
  };

  const confirmBooking = () => {
    const doc = DOCTORS.find((d) => d.id === doctorId);
    const appt = { id: uid("A"), doctor: doc.name, specialty: doc.specialty, date, time, mode, status: "Confirmed" };
    ctx.setAppointmentsUpcoming((prev) => [appt, ...prev]);
    trackEvent("appointment_booked", { patientId: PATIENT.id, doctorId: doc.id, date, time, mode });
    ctx.pushToast("Appointment booked with " + doc.name, "success");
    setStarted(false);
    setTab("upcoming");
  };

  const markCompleted = (a) => {
    ctx.setAppointmentsUpcoming((prev) => prev.filter((x) => x.id !== a.id));
    ctx.setAppointmentsHistory((prev) => [{ ...a, status: "Completed", followupRecommended: false }, ...prev]);
    trackEvent("appointment_completed", { patientId: PATIENT.id, appointmentId: a.id });
    trackEvent("consultation_completed", { patientId: PATIENT.id, appointmentId: a.id });
    ctx.pushToast("Appointment marked as completed", "success");

            <div className="grid grid-2" style={{ gap: 12 }}>

/* =========================================================================
   DIAGNOSTICS — recommended / book / completed
   ========================================================================= */
function DiagnosticsPage({ ctx }) {
  const bookTest = (t) => {
    trackEvent("test_booking_started", { patientId: PATIENT.id, testId: t.id, test: t.name });
    setTimeout(() => {
      trackEvent("test_booked", { patientId: PATIENT.id, testId: t.id, test: t.name });
      ctx.setDiagRecommended((prev) => prev.filter((x) => x.id !== t.id));
      ctx.setDiagBooked((prev) => [{ ...t, date: "Tomorrow, 8:00 AM" }, ...prev]);
      ctx.pushToast(t.name + " booked", "success");
    }, 250);
  };

  const completeTest = (t) => {
    trackEvent("test_completed", { patientId: PATIENT.id, testId: t.id, test: t.name });
    ctx.setDiagBooked((prev) => prev.filter((x) => x.id !== t.id));
    ctx.setDiagCompleted((prev) => [{ id: t.id, name: t.name, date: "Today", result: "Pending Review" }, ...prev]);
    ctx.pushToast(t.name + " marked completed", "success");
  };

  const uploadResult = (t) => {
    trackEvent("lab_result_uploaded", { patientId: PATIENT.id, testId: t.id, test: t.name });
    ctx.setDiagCompleted((prev) => prev.map((x) => (x.id === t.id ? { ...x, result: "Reviewed" } : x)));
    ctx.pushToast("Lab result uploaded for " + t.name, "success");
  };

  return (
    <div className="grid grid-3" style={{ alignItems: "start" }}>
      <div>
        <div className="section-head"><div className="section-title">Recommended Tests</div></div>
        <div className="card">
          <div className="hr-list">
            {ctx.diagRecommended.length === 0 && <div className="empty-state">Nothing recommended right now.</div>}
            {ctx.diagRecommended.map((t) => (
              <div className="list-row" key={t.id} style={{ alignItems: "flex-start" }}>
                <div className="list-row-icon" style={{ color: "var(--warning)" }}><Icon name="flask" size={17} /></div>
                <div style={{ flex: 1 }}>
                  <div className="list-row-title">{t.name}</div>
                  <div className="list-row-sub">{t.reason} • {t.recommendedBy}</div>
                  <span className={"badge " + (t.priority === "High" ? "badge-error" : "badge-warning")} style={{ marginTop: 6 }}>{t.priority} Priority</span>
                  <div style={{ marginTop: 10 }}>
                    <button className="btn btn-primary btn-sm" onClick={() => bookTest(t)}>Book Test</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div>
        <div className="section-head"><div className="section-title">Booked Tests</div></div>
        <div className="card">
          <div className="hr-list">
            {ctx.diagBooked.length === 0 && <div className="empty-state">No tests currently booked.</div>}
            {ctx.diagBooked.map((t) => (
              <div className="list-row" key={t.id} style={{ alignItems: "flex-start" }}>
                <div className="list-row-icon"><Icon name="calendar" size={17} /></div>
                <div style={{ flex: 1 }}>
                  <div className="list-row-title">{t.name}</div>
                  <div className="list-row-sub">Scheduled • {t.date}</div>
                  <div style={{ marginTop: 10 }}>
                    <button className="btn btn-outline btn-sm" onClick={() => completeTest(t)}>Mark Completed</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      <div>
        <div className="section-head"><div className="section-title">Completed Tests</div></div>
        <div className="card">
          <div className="hr-list">
            {ctx.diagCompleted.length === 0 && <div className="empty-state">No completed tests yet.</div>}
            {ctx.diagCompleted.map((t) => (
              <div className="list-row" key={t.id} style={{ alignItems: "flex-start" }}>
                <div className="list-row-icon" style={{ color: "var(--success)" }}><Icon name="check" size={17} /></div>
                <div style={{ flex: 1 }}>
                  <div className="list-row-title">{t.name}</div>
                  <div className="list-row-sub">{t.date}</div>
                  <span className={"badge " + (t.result === "Reviewed" ? "badge-success" : "badge-neutral")} style={{ marginTop: 6 }}>{t.result}</span>
                  {t.result !== "Reviewed" && (
                    <div style={{ marginTop: 10 }}>
                      <button className="btn btn-ghost btn-sm" onClick={() => uploadResult(t)}><Icon name="upload" size={13} /> Upload Result</button>
                    </div>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   CARE PROGRAMS
   ========================================================================= */
function ProgramsPage({ ctx }) {
  const [active, setActive] = useState(null);

  const viewProgram = (p) => {
    setActive(p);
    trackEvent("program_viewed", { patientId: PATIENT.id, programId: p.id, name: p.name });
    trackEvent("specialty_viewed", { patientId: PATIENT.id, specialty: p.specialty });
  };

  const enroll = (p) => {
    trackEvent("program_enrollment_started", { patientId: PATIENT.id, programId: p.id });
    trackEvent("program_enrolled", { patientId: PATIENT.id, programId: p.id });
    ctx.setPrograms((prev) => prev.map((x) => (x.id === p.id ? { ...x, enrolled: true } : x)));
    ctx.pushToast("Enrolled in " + p.name, "success");
    setActive(null);
  };

  return (
    <div>
      <div className="grid grid-2">
        {ctx.programs.map((p) => (
          <div className="card" key={p.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div className="stat-tile-icon"><Icon name="heart" size={16} /></div>
              {p.enrolled && <span className="badge badge-success">Enrolled</span>}
            </div>
            <div style={{ fontWeight: 700, fontSize: 15, marginTop: 12 }}>{p.name}</div>
            <p className="section-sub" style={{ margin: "6px 0 12px" }}>{p.description}</p>
            <div style={{ display: "flex", gap: 16, fontSize: 12, color: "var(--text-secondary)", marginBottom: 14 }}>
              <span><Icon name="clock" size={13} /> {p.duration}</span>
              <span><Icon name="user" size={13} /> {p.enrolledCount.toLocaleString("en-IN")} enrolled</span>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button className="btn btn-outline btn-sm" style={{ flex: 1 }} onClick={() => viewProgram(p)}>View Details</button>
              <button className="btn btn-primary btn-sm" style={{ flex: 1 }} disabled={p.enrolled} onClick={() => enroll(p)}>{p.enrolled ? "Enrolled" : "Enroll Now"}</button>
            </div>
          </div>
        ))}
      </div>

      {active && (
        <div className="modal-overlay" onClick={() => setActive(null)}>
          <div className="modal-box" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">{active.name}</div>
              <button className="icon-btn" onClick={() => setActive(null)}><Icon name="close" size={16} /></button>
            </div>
            <p style={{ fontSize: 13 }}>{active.description}</p>
            <div className="divider" />
            <div className="section-sub">Programme Duration</div>
            <div style={{ marginBottom: 10 }}>{active.duration}</div>
            <div className="section-sub">Currently Enrolled</div>
            <div style={{ marginBottom: 16 }}>{active.enrolledCount.toLocaleString("en-IN")} patients</div>
            <button className="btn btn-primary btn-block" disabled={active.enrolled} onClick={() => enroll(active)}>
              {active.enrolled ? "Already Enrolled" : "Enroll Now"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* =========================================================================
   SHARED: Explainability list, Revenue KPI strip, Simulation panel, Stream
   ========================================================================= */
function ExplainabilityList({ entries, ctx, compact }) {
  if (entries.length === 0) {
    return <div className="card empty-state">No risk signals detected yet. Use the simulation buttons on the CDP Dashboard to generate one.</div>;
  }
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {entries.slice(0, compact ? 4 : 50).map((r) => (
        <div className={"explain-card" + (r.resolved ? " resolved" : "")} key={r.id}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
            <div style={{ display: "flex", gap: 10 }}>
              <div className="list-row-icon" style={{
                color: r.severity === "error" ? "var(--error)" : r.severity === "warning" ? "var(--warning)" : "#1D4ED8",
                width: 32, height: 32,
              }}>
                <Icon name={r.severity === "error" ? "alert" : r.severity === "warning" ? "alert" : "info"} size={15} />
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>{r.title}</div>
                <div className="section-sub">{timeAgo(r.createdAt)}</div>
              </div>
            </div>
            {r.resolved ? <span className="badge badge-success">Resolved</span> : <span className={"badge " + (r.severity === "error" ? "badge-error" : r.severity === "warning" ? "badge-warning" : "badge-info")}>Active</span>}
          </div>
          <div className="divider" style={{ margin: "12px 0" }} />
          <div className="section-sub" style={{ marginBottom: 4, fontWeight: 600 }}>Why this happened</div>
          {r.reasoning.map((step, i) => (
            <div className="reasoning-step" key={i}>
              <span className="num">{i + 1}</span>
              <span>{step}</span>
            </div>
          ))}
          {!r.resolved && (
            <div style={{ marginTop: 12 }}>
              <button className="btn btn-secondary btn-sm" onClick={() => {
                if (r.type === "followup_leakage") ctx.resolveFollowUp(r.id);
                else if (r.type === "diagnostic_dropoff") ctx.resolveDiagnostic(r.id);
                else if (r.type === "chronic_care_candidate") ctx.resolveChronicCare(r.id, r.programKey);
              }}>{r.actionLabel}</button>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

                  <div className={"timeline-dot" + (EVENT_COLOR[e.event] ? "" : "")} style={{ borderColor: EVENT_COLOR[e.event] || "var(--primary)" }} />
                  <div className="timeline-time">{timeAgo(e.timestamp)}</div>
                  <div className="timeline-label">{humanizeEvent(e.event)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SegmentsTab({ ctx }) {
  const segs = [
    { key: "followUpDue", color: "var(--error)" },
    { key: "diagnosticDropoff", color: "var(--warning)" },
    { key: "chronicCare", color: "#1D4ED8" },
  ];
  return (
    <div>
      <div className="grid grid-3" style={{ marginBottom: 22 }}>
        {segs.map((s) => {
          const data = ctx.segments[s.key];
          const conversionRate = Math.round((data.recovered / (data.size + data.recovered)) * 100);
          return (
            <div className="segment-card" key={s.key}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div className="section-title">{data.label}</div>
                <span className="dot" style={{ background: s.color, marginTop: 6 }} />
              </div>
              <div style={{ fontSize: 26, fontWeight: 700, marginTop: 10 }}>{data.size}</div>
              <div className="section-sub">Patients currently in segment</div>
              <div className="segment-bar-track"><div className="segment-bar-fill" style={{ width: conversionRate + "%", background: s.color }} /></div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
                <span className="section-sub">Conversion rate</span>
                <span style={{ fontWeight: 700, fontSize: 13 }}>{conversionRate}%</span>
              </div>
              <div className="section-sub" style={{ marginTop: 4 }}>{data.recovered} recovered via intervention</div>
            </div>
          );
        })}
      </div>
      <div className="section-head"><div className="section-title">Explainability — Why Patients Entered This Segment</div></div>
      <ExplainabilityList entries={ctx.riskEntries} ctx={ctx} />
    </div>
  );
}

function PersonalizationTab({ ctx }) {
  const activeRisks = ctx.riskEntries.filter((r) => !r.resolved);
  const recommendations = [];
  if (PATIENT.conditions.includes("Type 2 Diabetes")) {
    const prog = ctx.programs.find((p) => p.key === "diabetes");
    if (prog && !prog.enrolled) recommendations.push({ title: "Suggest Diabetes Care Program", detail: "Patient has a diabetes diagnosis but is not yet enrolled.", action: "Recommend Program" });
  }
  if (ctx.diagRecommended.length > 0) {
    recommendations.push({ title: "Nudge: Book " + ctx.diagRecommended[0].name, detail: "Recommended by " + ctx.diagRecommended[0].recommendedBy + " and still pending.", action: "Send Reminder" });
  }
  activeRisks.forEach((r) => {
    recommendations.push({ title: "Resolve: " + r.title, detail: r.reasoning[r.reasoning.length - 1], action: r.actionLabel, riskId: r.id, riskType: r.type, programKey: r.programKey });
  });

  return (
    <div className="grid grid-2" style={{ alignItems: "start" }}>
      <div>
        <div className="section-head"><div className="section-title">Recommendations</div></div>
        <div className="card">
          <div className="hr-list">
            {recommendations.length === 0 && <div className="empty-state">No personalised recommendations at this time.</div>}
            {recommendations.map((r, i) => (
              <div className="list-row" key={i} style={{ alignItems: "flex-start" }}>
                <div className="list-row-icon"><Icon name="target" size={16} /></div>
                <div style={{ flex: 1 }}>
                  <div className="list-row-title">{r.title}</div>
                  <div className="list-row-sub">{r.detail}</div>
                </div>
                {r.riskId && (
                  <button className="btn btn-secondary btn-sm" onClick={() => {
                    if (r.riskType === "followup_leakage") ctx.resolveFollowUp(r.riskId);
                    else if (r.riskType === "diagnostic_dropoff") ctx.resolveDiagnostic(r.riskId);
                    else if (r.riskType === "chronic_care_candidate") ctx.resolveChronicCare(r.riskId, r.programKey);
                  }}>{r.action}</button>
                )}
              </div>
            ))}
          </div>
        </div>

        <div className="section-head" style={{ marginTop: 22 }}><div className="section-title">Follow-Up Reminders</div></div>
        <div className="card">
          <div className="hr-list">
            {ctx.appointmentsHistory.filter((a) => a.followupRecommended).map((a) => (
              <div className="list-row" key={a.id}>
                <div className="list-row-icon"><Icon name="bell" size={16} /></div>
                <div>
                  <div className="list-row-title">Remind about follow-up with {a.doctor}</div>
                  <div className="list-row-sub">Last visit {a.date}</div>
                </div>
              </div>
            ))}
            {ctx.appointmentsHistory.filter((a) => a.followupRecommended).length === 0 && <div className="empty-state">No follow-up reminders scheduled.</div>}
          </div>
        </div>
      </div>

      <div>
        <div className="section-head"><div className="section-title">Program Suggestions</div></div>
        <div className="grid" style={{ gridTemplateColumns: "1fr", gap: 12 }}>
          {ctx.programs.filter((p) => !p.enrolled).map((p) => (
            <div className="card" key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>{p.name}</div>
                <div className="section-sub">Matched on condition relevance</div>
              </div>
              <button className="btn btn-outline btn-sm" onClick={() => ctx.navigate("programs")}>View</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function FunnelTab({ ctx }) {
  const counts = ctx.funnelCounts;
  const first = counts[FUNNEL_STEPS[0].key] || 1;
  return (
    <div className="card">
      <div className="funnel-row" style={{ borderBottom: "1px solid var(--border)", paddingBottom: 10, fontSize: 11.5, fontWeight: 700, color: "var(--text-secondary)", textTransform: "uppercase", letterSpacing: ".04em" }}>
        <div>Step</div><div>Volume</div><div>Drop-off</div><div className="funnel-conv">Conversion</div>
      </div>
      {FUNNEL_STEPS.map((step, i) => {
        const value = counts[step.key] || 0;
        const prevValue = i === 0 ? value : (counts[FUNNEL_STEPS[i - 1].key] || 1);
        const dropoff = i === 0 ? 0 : Math.round(((prevValue - value) / prevValue) * 100);
        const conversion = Math.round((value / first) * 100);
        const widthPct = Math.max(4, conversion);
        return (
          <div className="funnel-row" key={step.key}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{step.label}</div>
            <div className="funnel-bar-track">
              <div className="funnel-bar-fill" style={{ width: widthPct + "%" }}>
                <span style={{ color: "#fff", fontSize: 11.5, fontWeight: 700, marginLeft: 10 }}>{value.toLocaleString("en-IN")}</span>
              </div>
            </div>
            <div style={{ fontSize: 12.5, color: i === 0 ? "var(--text-secondary)" : "var(--error)", fontWeight: 600 }}>{i === 0 ? "—" : dropoff + "%"}</div>
            <div className="funnel-conv" style={{ fontSize: 12.5, fontWeight: 600, color: "var(--primary-hover)" }}>{conversion}%</div>
          </div>
        );
      })}
      <div className="divider" />
      <div className="section-sub">
        Overall conversion from first appointment booking to program enrollment is{" "}
        <strong style={{ color: "var(--text-primary)" }}>{Math.round(((counts.program_enrolled || 0) / first) * 100)}%</strong>.
      </div>
    </div>
  );
}

/* =========================================================================
   MOUNT
   ========================================================================= */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
