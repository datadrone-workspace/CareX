<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareX | Patient Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js"></script>
<style>
  :root{
    --green:#16A34A;
    --green-hover:#15803D;
    --green-light:#DCFCE7;
    --bg:#FFFFFF;
    --bg-alt:#F8FAF8;
    --text:#111827;
    --text-secondary:#6B7280;
    --border:#E5E7EB;
    --success:#22C55E;
    --warning:#F59E0B;
    --error:#EF4444;
    --card:#F3F4F6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg-alt);color:var(--text);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:8px;}

  .app{min-height:100vh;display:flex;flex-direction:column;}

  /* ---- Top Nav ---- */
  .topbar{
    background:var(--bg);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
  }
  .topbar-inner{
    max-width:1280px;margin:0 auto;padding:0 24px;
    display:flex;align-items:center;justify-content:space-between;height:64px;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;letter-spacing:-0.02em;}
  .brand-mark{
    width:30px;height:30px;border-radius:8px;background:var(--green);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand-mark svg{width:16px;height:16px;}
  .nav-links{display:flex;gap:4px;align-items:center;}
  .nav-link{
    padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--text-secondary);
    transition:background .15s, color .15s;
  }
  .nav-link:hover{background:var(--bg-alt);color:var(--text);}
  .nav-link.active{background:var(--green-light);color:var(--green-hover);}
  .nav-right{display:flex;align-items:center;gap:14px;}
  .icon-btn{
    width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg);
    display:flex;align-items:center;justify-content:center;position:relative;
  }
  .icon-btn:hover{background:var(--bg-alt);}
  .dot-badge{
    position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;
    background:var(--error);border:1.5px solid var(--bg);
  }
  .avatar{
    width:36px;height:36px;border-radius:50%;background:var(--green);color:#fff;font-weight:600;font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .mobile-toggle{display:none;}

  /* ---- Layout ---- */
  .page{max-width:1280px;margin:0 auto;padding:28px 24px 64px;width:100%;flex:1;}
  .section{margin-bottom:32px;}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-size:17px;font-weight:600;letter-spacing:-0.01em;}
  .section-link{font-size:13px;font-weight:600;color:var(--green-hover);}
  .grid{display:grid;gap:16px;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  @media (max-width:900px){
    .grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:640px){
    .grid-3,.grid-4,.grid-2{grid-template-columns:1fr;}
  }

  .card{
    background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:18px;
  }
  .card-alt{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}

  .pill{
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
    padding:3px 10px;border-radius:999px;
  }
  .pill-green{background:var(--green-light);color:var(--green-hover);}
  .pill-amber{background:#FEF3C7;color:#92400E;}
  .pill-red{background:#FEE2E2;color:#991B1B;}
  .pill-gray{background:#F3F4F6;color:var(--text-secondary);}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;border:1px solid transparent;
    transition:background .15s,border-color .15s, transform .1s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-hover);}
  .btn-secondary{background:var(--bg);color:var(--text);border-color:var(--border);}
  .btn-secondary:hover{background:var(--bg-alt);}
  .btn-ghost{background:transparent;color:var(--green-hover);}
  .btn-ghost:hover{background:var(--green-light);}
  .btn-sm{padding:6px 12px;font-size:12.5px;}
  .btn-block{width:100%;}

  /* ---- Hero ---- */
  .hero{
    background:linear-gradient(135deg, #103A22 0%, #14532D 38%, #16A34A 100%);
    border-radius:18px;padding:28px 30px;color:#fff;position:relative;overflow:hidden;margin-bottom:28px;
  }
  .hero::after{
    content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,0.10), transparent 70%);
  }
  .hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;}
  .hero-greeting{font-size:23px;font-weight:700;letter-spacing:-0.01em;}
  .hero-sub{font-size:13.5px;color:rgba(255,255,255,0.78);margin-top:4px;max-width:480px;}
  .hero-stats{display:flex;gap:22px;margin-top:20px;flex-wrap:wrap;}
  .hero-stat-num{font-size:20px;font-weight:700;}
  .hero-stat-label{font-size:11.5px;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
  .hero-cta{background:#fff;color:var(--green-hover);}
  .hero-cta:hover{background:#F0FDF4;}

  /* ---- Appointment / list rows ---- */
  .row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row-avatar{
    width:42px;height:42px;border-radius:10px;background:var(--green-light);color:var(--green-hover);
    font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .row-main{flex:1;min-width:0;}
  .row-title{font-size:14px;font-weight:600;}
  .row-sub{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}
  .row-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}

  /* Pending actions */
  .action-item{
    display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;
  }
  .action-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .action-icon svg{width:17px;height:17px;}

  /* Program card */
  .program-card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:var(--bg);}
  .program-banner{height:6px;background:var(--green);}
  .program-body{padding:18px;}
  .program-title{font-size:15px;font-weight:600;margin-bottom:4px;}
  .program-desc{font-size:12.5px;color:var(--text-secondary);line-height:1.5;margin-bottom:12px;}

  /* doctors */
  .filters-bar{
    display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;background:var(--bg);border:1px solid var(--border);

  .input{
    border:1px solid var(--border);border-radius:9px;padding:9px 12px;font-size:13.5px;font-family:inherit;background:var(--bg);color:var(--text);
  }
  .input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-light);}
  select.input{appearance:none;}
  .search-input{flex:1;min-width:180px;}

  .doctor-card{
    background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:10px;
  }
  .doctor-top{display:flex;gap:12px;align-items:flex-start;}
  .doctor-photo{
    width:54px;height:54px;border-radius:12px;background:var(--green-light);color:var(--green-hover);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0;
  }
  .doctor-name{font-size:15px;font-weight:600;}
  .doctor-spec{font-size:12.5px;color:var(--green-hover);font-weight:600;margin-top:1px;}
  .doctor-meta{font-size:12px;color:var(--text-secondary);margin-top:6px;display:flex;flex-direction:column;gap:3px;}
  .doctor-meta span{display:flex;align-items:center;gap:6px;}

  /* tabs */
  .tabbar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto;}
  .tab{
    padding:10px 4px;margin-right:22px;font-size:13.5px;font-weight:600;color:var(--text-secondary);
    border-bottom:2px solid transparent;white-space:nowrap;
  }
  .tab.active{color:var(--green-hover);border-color:var(--green);}

  /* timeline */
  .timeline{position:relative;padding-left:26px;}
  .timeline::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--border);}
  .timeline-item{position:relative;padding-bottom:22px;}
  .timeline-item:last-child{padding-bottom:0;}
  .timeline-dot{position:absolute;left:-26px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--green);border:3px solid var(--green-light);}
  .timeline-dot.muted{background:#D1D5DB;border-color:#F3F4F6;}
  .timeline-date{font-size:11.5px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.03em;}
  .timeline-title{font-size:14px;font-weight:600;margin-top:2px;}
  .timeline-desc{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}

  /* modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(17,24,39,.5);display:flex;align-items:center;justify-content:center;
    z-index:100;padding:20px;
  }
  .modal{
    background:#fff;border-radius:16px;max-width:460px;width:100%;padding:24px;max-height:90vh;overflow-y:auto;
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .modal-title{font-size:16px;font-weight:700;}
  .close-x{width:30px;height:30px;border-radius:8px;border:none;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;}
  .field{margin-bottom:14px;}
  .field label{font-size:12.5px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;
    padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:500;z-index:200;display:flex;align-items:center;gap:8px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
  }

  .empty{text-align:center;padding:36px 20px;color:var(--text-secondary);font-size:13.5px;}

  .footer-note{text-align:center;font-size:11.5px;color:var(--text-secondary);padding:18px 0 0;}

  /* ---- CDP banner (single active personalization banner) ---- */
  .cdp-banner{
    display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border);
    border-left:4px solid var(--green);border-radius:14px;padding:16px 18px;margin-bottom:20px;
    animation:bannerIn .25s ease;
  }
  @keyframes bannerIn{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);}}
  .cdp-banner-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .cdp-banner-title{font-size:14.5px;font-weight:700;}
  .cdp-banner-msg{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}
  .cdp-banner-tag{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--green-hover);background:var(--green-light);padding:2px 8px;border-radius:999px;margin-bottom:4px;display:inline-block;}

  /* ---- Auth (login / signup) ---- */
  .auth-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);padding:24px;}
  .auth-card{background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:34px 32px;width:100%;max-width:400px;}
  .auth-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;margin-bottom:22px;justify-content:center;}
  .auth-title{font-size:19px;font-weight:700;text-align:center;}
  .auth-sub{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:4px;margin-bottom:22px;}
  .auth-switch{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:16px;}
  .auth-switch a{color:var(--green-hover);font-weight:600;cursor:pointer;}
  .auth-error{font-size:12.5px;color:var(--error);background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;padding:8px 10px;margin-bottom:14px;}
  .logout-link{font-size:12.5px;font-weight:600;color:var(--text-secondary);cursor:pointer;padding:8px 4px;}
  .logout-link:hover{color:var(--error);}

  /* mobile nav */
  @media (max-width:860px){
    .nav-links{display:none;}
    .mobile-toggle{display:flex;}
    .mobile-menu{
      position:fixed;top:64px;left:0;right:0;background:#fff;border-bottom:1px solid var(--border);
      display:flex;flex-direction:column;padding:8px;z-index:60;box-shadow:0 12px 24px rgba(0,0,0,.06);
    }
    .mobile-menu .nav-link{padding:12px 14px;}
  }
</style>

/* ============================================================
   SILENT TRACKING LAYER
   Placeholder analytics hooks for future Segment / CDP wiring.
   Every call is silent — nothing renders in the UI.
   Events are persisted to localStorage and broadcast over a
   BroadcastChannel so other CareX surfaces (e.g. the internal
   Simulation Center) can observe them in real time.
   ============================================================ */
const EVENT_STORE_KEY = "carex_event_log";
const CHANNEL_NAME = "carex_events";
const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL_NAME) : null;

function getSessionId(){
  let sid = sessionStorage.getItem("carex_session_id");
  if(!sid){
    sid = "sess_" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem("carex_session_id", sid);
  }
  return sid;
}

function trackEvent(eventName, properties = {}){
  try{
    const payload = {
      event: eventName,
      properties,
      sessionId: getSessionId(),
      source: "carex_patient_portal",
      timestamp: new Date().toISOString(),
    };
    const existing = JSON.parse(localStorage.getItem(EVENT_STORE_KEY) || "[]");
    existing.push(payload);
    // keep the log bounded
    localStorage.setItem(EVENT_STORE_KEY, JSON.stringify(existing.slice(-500)));
    if(bc) bc.postMessage(payload);
    // Fire the real Segment event. analytics.js is loaded in <head>.
    if(window.analytics && typeof window.analytics.track === "function"){
      window.analytics.track(eventName, properties);
    }
  }catch(e){ /* tracking must never break the UX */ }
}

/* ============================================================
   DYNAMIC USER PROFILE (login / signup / profile page)
   The signed-in user's name & details are stored in localStorage
   instead of a hardcoded default, so whatever the patient enters
   at signup (or edits later in Profile) is what's shown everywhere.
   ============================================================ */
const USER_STORAGE_KEY = "carex_user_profile";

function loadUser(){
  try{
    const raw = localStorage.getItem(USER_STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return null;
}

function saveUser(user){
  try{ localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(user)); }catch(e){}
}

function nameFromEmail(email){
  const handle = (email || "").split("@")[0] || "Patient";
  return handle
    .replace(/[._-]+/g, " ")
    .split(" ")
    .filter(Boolean)
    .map(w => w[0].toUpperCase() + w.slice(1))
    .join(" ") || "Patient";
}

function getFirstName(name){
  return ((name || "Patient").trim().split(" ")[0]) || "Patient";
}

function getInitials(name){
  const parts = (name || "Patient").trim().split(" ").filter(Boolean);
  if(parts.length === 0) return "P";
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

  );
}

function BookConsultationModal({ doctor, onClose, onConfirmed }){
  const [date, setDate] = useState("");
  const [time, setTime] = useState("");
  const [reason, setReason] = useState("");

  useEffect(()=>{
    trackEvent("appointment_booking_started", { doctorId: doctor.id, doctorName: doctor.name, specialty: doctor.specialty });

  const confirm = () => {

    trackEvent("appointment_booked", {

function DoctorsPage({ openBooking }){
  const [query, setQuery] = useState("");
  const [specialty, setSpecialty] = useState("All Specialties");
  const [location, setLocation] = useState("All Locations");
  const [sort, setSort] = useState("experience");

  const filtered = useMemo(()=>{
    return DOCTORS.filter(d=>{
      const matchesQuery = d.name.toLowerCase().includes(query.toLowerCase()) || d.specialty.toLowerCase().includes(query.toLowerCase());
      const matchesSpecialty = specialty === "All Specialties" || d.specialty === specialty;
      const matchesLocation = location === "All Locations" || d.location.startsWith(location);
      return matchesQuery && matchesSpecialty && matchesLocation;
    }).sort((a,b)=> sort==="experience" ? b.experience - a.experience : b.rating - a.rating);
  },[query, specialty, location, sort]);

  useEffect(()=>{
    if(specialty !== "All Specialties") trackEvent("specialty_viewed", { specialty });
  },[specialty]);

  return (
    <div>
      <div className="section-head"><div className="section-title" style={{fontSize:20}}>Find a doctor</div></div>
      <div className="filters-bar">
        <div className="search-input" style={{position:"relative"}}>

            value={query} onChange={e=>setQuery(e.target.value)} />
          <Icon name="search" width="15" height="15" style={{position:"absolute", left:11, top:10, color:"var(--text-secondary)"}} />
        </div>
        <select className="input" value={specialty} onChange={e=>setSpecialty(e.target.value)}>
          {SPECIALTIES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className="input" value={location} onChange={e=>setLocation(e.target.value)}>
          {LOCATIONS.map(l=><option key={l}>{l}</option>)}
        </select>
        <select className="input" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="experience">Sort: Most experienced</option>
          <option value="rating">Sort: Highest rated</option>
        </select>
      </div>

      <div className="grid grid-3">
        {filtered.map(d=>(
          <div className="doctor-card" key={d.id}>
            <div className="doctor-top">
              <div className="doctor-photo">{d.name.split(" ").slice(-1)[0][0]}</div>
              <div>
                <div className="doctor-name">{d.name}</div>
                <div className="doctor-spec">{d.specialty}</div>
              </div>
            </div>
            <div className="doctor-meta">
              <span><Icon name="pin" width="13" height="13" />{d.location}</span>
              <span><Icon name="clock" width="13" height="13" />{d.experience} years experience</span>
              <span><Icon name="star" width="13" height="13" />{d.rating} rating</span>

            <div style={{display:"flex", gap:8, marginTop:6}}>
              <button className="btn btn-secondary btn-sm" style={{flex:1}}
                onClick={()=>trackEvent("doctor_profile_viewed", { doctorId:d.id, doctorName:d.name, specialty:d.specialty })}>
                View profile

              <button className="btn btn-primary btn-sm" style={{flex:1}} onClick={()=>openBooking(d)}>Book</button>

        ))}

const PAGES = [
  { key:"home", label:"Home", icon:"home" },
  { key:"doctors", label:"Doctors", icon:"doctors" },
  { key:"appointments", label:"Appointments", icon:"calendar" },
  { key:"diagnostics", label:"Diagnostics", icon:"flask" },

function App({ onLogout, user, onUpdateUser }){
  const [page, setPage] = useState("home");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [bookingDoctor, setBookingDoctor] = useState(null);
  const [bookingTest, setBookingTest] = useState(null);
  const [enrollProgram, setEnrollProgram] = useState(null);
  const [toast, setToast] = useState(null);
  const [activeBanner, setActiveBanner] = useState(()=>{
    try{ return localStorage.getItem(BANNER_STORAGE_KEY) || null; }catch(e){ return null; }
  });

  // Listen for simulator-fired CDP events (BroadcastChannel, same-browser
  // tabs) and localStorage 'storage' events (fallback / cross-tab) so the
  // homepage banner updates live without a refresh. Only ONE banner is
  // ever shown — whichever recognised event arrives most recently wins.
  useEffect(()=>{
    const applyEvent = (eventName) => {
      if(!BANNER_CONFIG[eventName]) return;
      setActiveBanner(eventName);
      try{ localStorage.setItem(BANNER_STORAGE_KEY, eventName); }catch(e){}
    };
    let bcHandler;
    if(bc){
      bcHandler = (msg) => { if(msg && msg.data && msg.data.event) applyEvent(msg.data.event); };
      bc.addEventListener("message", bcHandler);
    }
    const storageHandler = (e) => {
      if(e.key === BANNER_STORAGE_KEY){
        setActiveBanner(e.newValue || null);
      }
    };
    window.addEventListener("storage", storageHandler);
    return () => {
      if(bc && bcHandler) bc.removeEventListener("message", bcHandler);
      window.removeEventListener("storage", storageHandler);
    };
  },[]);

  // Background CDP / identity simulation — fires once on load, no UI surface.
  useEffect(()=>{
    trackEvent("identity_resolved", { patientId: PATIENT.patientId });
    trackEvent("customer_profile_unified", { patientId: PATIENT.patientId, sources: ["EHR","Booking","Diagnostics","CRM"] });
    trackEvent("segment_assigned", { patientId: PATIENT.patientId, segment: "follow_up_due" });
    trackEvent("segment_assigned", { patientId: PATIENT.patientId, segment: "diagnostic_dropoff_risk" });
    trackEvent("segment_assigned", { patientId: PATIENT.patientId, segment: "diabetes_care_candidate" });
    trackEvent("chronic_care_candidate_detected", { patientId: PATIENT.patientId, program: "Diabetes Care Program", reason: "Diabetes consultation + HbA1c recommendation + nutrition follow-up pattern" });
    trackEvent("followup_recommended", { patientId: PATIENT.patientId, specialty:"Cardiology", doctor:"Dr. Ramesh Subramanian", windowDays: 30 });
    if(FOLLOWUP_DAYS_OVERDUE > 0){
      trackEvent("followup_due", { patientId: PATIENT.patientId, daysOverdue: FOLLOWUP_DAYS_OVERDUE });
      trackEvent("patient_at_risk", { patientId: PATIENT.patientId, riskType: "follow_up_leakage", daysOverdue: FOLLOWUP_DAYS_OVERDUE });
    }
    trackEvent("test_recommended", { testName: "Lipid Profile" });
    trackEvent("test_recommended", { testName: "HbA1c" });
    trackEvent("diagnostic_dropoff_detected", { testName: "Lipid Profile", reason: "Recommended 02 Apr 2026, no booking on file" });
    trackEvent("personalization_applied", { patientId: PATIENT.patientId, surface:"home", experiment:"diabetes_program_hero" });
    trackEvent("experience_rendered", { surface:"home", variant:"personalized" });
  },[]);

  const navigate = (key) => {
    setPage(key);
    setMobileOpen(false);
    trackEvent("page_viewed", { page: key });
    window.scrollTo({ top:0, behavior:"smooth" });
  };

  useEffect(()=>{ trackEvent("page_viewed", { page:"home" }); },[]);

  const openBooking = (doctor) => setBookingDoctor(doctor);
  const openTestBooking = (test) => setBookingTest(test);
  const openEnroll = (program) => setEnrollProgram(program);

  // CTA on the homepage banner: open the right modal AND clear the banner +
  // its persisted state immediately, per the "only one active state" rule.
  const clearBanner = () => {
    setActiveBanner(null);
    try{ localStorage.removeItem(BANNER_STORAGE_KEY); }catch(e){}
  };
  const onBannerCta = (bannerKey) => {
    const cfg = BANNER_CONFIG[bannerKey];
    if(!cfg) return;
    trackEvent("personalization_applied", { patientId: PATIENT.patientId, surface:"home_banner", event: bannerKey, action:"cta_clicked" });
    if(cfg.openKey === "booking") openBooking(DOCTORS[0]);
    if(cfg.openKey === "test") openTestBooking(RECOMMENDED_TESTS[0]);
    if(cfg.openKey === "enroll") openEnroll(CARE_PROGRAMS.find(p=>p.id==="cardiac") || CARE_PROGRAMS[0]);
    clearBanner();
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <BrandMark/>
            CareX
          </div>
          <div className="nav-links">
            {PAGES.map(p=>(
              <div key={p.key} className={`nav-link ${page===p.key?"active":""}`} onClick={()=>navigate(p.key)}>
                {p.label}
              </div>
            ))}
          </div>
          <div className="nav-right">
            <button className="icon-btn"><Icon name="bell" width="16" height="16" /><span className="dot-badge"></span></button>
            <div className="avatar">{getInitials(user.name)}</div>
            <span className="logout-link" onClick={onLogout}>Log out</span>
            <button className="icon-btn mobile-toggle" onClick={()=>setMobileOpen(o=>!o)}>
              <Icon name={mobileOpen ? "x" : "menu"} width="16" height="16" />
            </button>
          </div>
        </div>
        {mobileOpen && (
          <div className="mobile-menu">
            {PAGES.map(p=>(
              <div key={p.key} className={`nav-link ${page===p.key?"active":""}`} onClick={()=>navigate(p.key)}>{p.label}</div>
            ))}
          </div>
        )}
      </div>

      <div className="page">
        {page === "home" && <HomePage navigate={navigate} openBooking={openBooking} openTestBooking={openTestBooking} openEnroll={openEnroll} activeBanner={activeBanner} onBannerCta={onBannerCta} user={user} />}
        {page === "doctors" && <DoctorsPage openBooking={openBooking} />}
        {page === "appointments" && <AppointmentsPage openBooking={openBooking} />}
        {page === "diagnostics" && <DiagnosticsPage openTestBooking={openTestBooking} />}
        {page === "programs" && <ProgramsPage openEnroll={openEnroll} />}
        {page === "portal" && <PatientPortalPage />}
        {page === "profile" && <ProfilePage user={user} onSave={(updated)=>{ onUpdateUser(updated); setToast("Profile updated successfully"); }} />}
        <div className="footer-note">CareX Hospitals · CRX-10482 · This is a sample patient experience for demonstration purposes</div>
      </div>

      {bookingDoctor && (
        <BookConsultationModal doctor={bookingDoctor} onClose={()=>setBookingDoctor(null)} onConfirmed={(msg)=>setToast(msg)} />
      )}
      {bookingTest && (
        <BookTestModal test={bookingTest} onClose={()=>setBookingTest(null)} onConfirmed={(msg)=>setToast(msg)} />
      )}
      {enrollProgram && (
        <EnrollModal program={enrollProgram} onClose={()=>setEnrollProgram(null)} onConfirmed={(msg)=>setToast(msg)} />
      )}
      {toast && <Toast message={toast} onDone={()=>setToast(null)} />}
    </div>
  );
}

const AUTH_KEY = "carex_logged_in";

function LoginPage({ onLogin, onSwitch }){
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");

  const submit = (e) => {
    e.preventDefault();
    if(!email || !password){ setError("Please enter your email and password."); return; }
    setError("");

    // Reuse the previously signed-up profile for this browser if one
    // exists; otherwise derive a display name from the email entered.
    const existing = loadUser();
    const name = existing ? existing.name : nameFromEmail(email);
    const user = existing
      ? { ...existing, email }
      : { name, email, age: PATIENT.age, gender: PATIENT.gender, bloodGroup: PATIENT.bloodGroup, city: PATIENT.city, patientId: PATIENT.patientId };

    trackEvent("page_viewed", { page: "login_success" });
    trackEvent("user_logged_in", { user_name: name });
    if(window.analytics && typeof window.analytics.identify === "function"){
      window.analytics.identify(user.patientId, { name: user.name, email: user.email });
    }
    onLogin(user);
  };

  return (
    <div className="auth-shell">
      <div className="auth-card">
        <div className="auth-brand"><BrandMark/> CareX</div>
        <div className="auth-title">Welcome back</div>
        <div className="auth-sub">Log in to your patient portal</div>

    try{ return localStorage.getItem(AUTH_KEY) === "true"; }catch(e){ return false; }
  });
  const [user, setUser] = useState(()=>loadUser());
  const [authView, setAuthView] = useState("login");

  const login = (newUser) => {
    saveUser(newUser);
    setUser(newUser);
    try{ localStorage.setItem(AUTH_KEY, "true"); }catch(e){}
    setAuthed(true);
  };
  const logout = () => {
    try{ localStorage.removeItem(AUTH_KEY); }catch(e){}
    setAuthed(false);
    setAuthView("login");
  };
  const updateUser = (updates) => {
    const merged = { ...(user || {}), ...updates };
    saveUser(merged);
    setUser(merged);
  };

  if(!authed){
    return authView === "login"
      ? <LoginPage onLogin={login} onSwitch={()=>setAuthView("signup")} />
      : <SignupPage onSignup={login} onSwitch={()=>setAuthView("login")} />;
  }
  const safeUser = user || { name: "Patient", email: "", patientId: PATIENT.patientId, age: PATIENT.age, gender: PATIENT.gender, bloodGroup: PATIENT.bloodGroup, city: PATIENT.city };
  return <App onLogout={logout} user={safeUser} onUpdateUser={updateUser} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
